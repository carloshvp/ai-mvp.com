<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-labelledby="title description">
  <title id="title">Governed Embodied Agent Lab architecture</title>
  <desc id="description">A robot action passes through trusted context, policy evaluation, action-bound approval, simulation, and a tamper-evident evidence ledger.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#123b4a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#49d6c8"/>
      <stop offset="1" stop-color="#f2b84b"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#8fb9c4"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1200" height="660" rx="24" fill="url(#bg)"/>
  <rect x="56" y="48" width="84" height="4" rx="2" fill="url(#accent)"/>
  <text x="56" y="96" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Governed action path</text>
  <text x="56" y="128" fill="#a9c7d2" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Every meaningful action is identified, evaluated, approved when needed, executed, and evidenced.</text>

  <g filter="url(#shadow)">
    <rect x="56" y="194" width="180" height="132" rx="16" fill="#102a43" stroke="#49d6c8" stroke-width="2"/>
    <rect x="278" y="194" width="180" height="132" rx="16" fill="#102a43" stroke="#4fa6b5" stroke-width="2"/>
    <rect x="500" y="194" width="180" height="132" rx="16" fill="#102a43" stroke="#f2b84b" stroke-width="2"/>
    <rect x="722" y="194" width="180" height="132" rx="16" fill="#102a43" stroke="#f2b84b" stroke-width="2"/>
    <rect x="944" y="194" width="200" height="132" rx="16" fill="#102a43" stroke="#49d6c8" stroke-width="2"/>
  </g>

  <text x="80" y="229" fill="#49d6c8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1">01 REQUEST</text>
  <text x="80" y="268" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23" font-weight="700">Agent action</text>
  <text x="80" y="296" fill="#bdd2d9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Intent + parameters</text>

  <text x="302" y="229" fill="#49d6c8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1">02 TRUST</text>
  <text x="302" y="268" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23" font-weight="700">Context</text>
  <text x="302" y="296" fill="#bdd2d9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Identity + world facts</text>

  <text x="524" y="229" fill="#f2b84b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1">03 DECIDE</text>
  <text x="524" y="268" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23" font-weight="700">Policy gate</text>
  <text x="524" y="296" fill="#bdd2d9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Allow / deny / approve</text>

  <text x="746" y="229" fill="#f2b84b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1">04 CONTROL</text>
  <text x="746" y="268" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23" font-weight="700">Approval</text>
  <text x="746" y="296" fill="#bdd2d9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Bound + one-time</text>

  <text x="968" y="229" fill="#49d6c8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1">05 ACT</text>
  <text x="968" y="268" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23" font-weight="700">Robot world</text>
  <text x="968" y="296" fill="#bdd2d9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Persistent simulation</text>

  <g stroke="#8fb9c4" stroke-width="2" marker-end="url(#arrow)">
    <line x1="236" y1="260" x2="268" y2="260"/>
    <line x1="458" y1="260" x2="490" y2="260"/>
    <line x1="680" y1="260" x2="712" y2="260"/>
    <line x1="902" y1="260" x2="934" y2="260"/>
  </g>

  <rect x="190" y="430" width="820" height="142" rx="18" fill="#0b1d2d" stroke="#49d6c8" stroke-opacity="0.65" stroke-width="2"/>
  <text x="226" y="470" fill="#49d6c8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1">EVIDENCE CONTINUITY</text>
  <text x="226" y="510" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">Hash-chained action record</text>
  <text x="226" y="543" fill="#bdd2d9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">Request, identity, facts, policy version, decision, approval, result, and previous record hash</text>

  <g stroke="#49d6c8" stroke-opacity="0.55" stroke-width="2" marker-end="url(#arrow)">
    <path d="M146 326 V380 H330 V420" fill="none"/>
    <path d="M368 326 V390 H465 V420" fill="none"/>
    <path d="M590 326 V420" fill="none"/>
    <path d="M812 326 V390 H735 V420" fill="none"/>
    <path d="M1044 326 V380 H870 V420" fill="none"/>
  </g>

  <text x="56" y="626" fill="#7fa7b2" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">Reference implementation, not a certified safety controller.</text>
</svg>
